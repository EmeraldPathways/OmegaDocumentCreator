services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../../apps/api
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ../../storage/clients:/data/clients
      - ../../storage/backups:/data/backups
      - ../../templates/docx:/app/templates/docx

  frontend:
    build:
      context: ../../apps/frontend
    env_file:
      - ../../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
